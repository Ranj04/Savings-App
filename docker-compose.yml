# One-command full stack: MongoDB + Java backend + nginx-served React frontend.
#   cp .env.example .env   (fill in Plaid keys if you want bank linking)
#   docker compose up --build
# Then open http://localhost:4000  (override with WEB_PORT=5000 docker compose up)
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--quiet"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # TCP probe avoids mongosh connection spam in logs; port open is enough for startup ordering.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/27017'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./back-end
    restart: unless-stopped
    environment:
      - PORT=1299
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB=savings
      # APP_ENV=production enables Secure cookies (only when served over HTTPS)
      - APP_ENV=${APP_ENV:-}
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID:-}
      - PLAID_SECRET=${PLAID_SECRET:-}
      - PLAID_ENV=${PLAID_ENV:-sandbox}
      - PLAID_TOKEN_KEY=${PLAID_TOKEN_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build: ./front-end
    restart: unless-stopped
    # Host port is overridable to avoid clashing with other local dev servers:
    #   WEB_PORT=5000 docker compose up
    ports:
      - "${WEB_PORT:-4000}:80"
    depends_on:
      - backend

volumes:
  mongo-data:
