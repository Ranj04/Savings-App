server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Exact API endpoints (bare paths that ARE the API) — proxied to the backend.
    location ~ ^/(login|logout|createUser|getTransactions|transactions|deposit|withdraw|createDeposit|createWithdraw|transfer|transferGoals|savings|getSavings|balance|financing|repay|health)$ {
        proxy_pass http://backend:1299;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API sub-paths (e.g. /accounts/list, /goals/create, /plaid/refresh). Bare
    # /accounts and /goals are NOT matched here, so they fall through to the SPA
    # fallback below — otherwise a refresh/nav to those routes 404s on the API.
    location ~ ^/(auth|goals|accounts|routines|plaid|transactions|spend)/ {
        proxy_pass http://backend:1299;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single-page app fallback (serves index.html for client-side routes).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
