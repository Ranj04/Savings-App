server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API routes are reverse-proxied to the backend so the browser sees a single
    # origin (no CORS, and SameSite=Lax session cookies work cleanly).
    location ~ ^/(login|logout|auth|createUser|getTransactions|transactions|deposit|withdraw|createDeposit|createWithdraw|transfer|transferGoals|goals|accounts|routines|plaid|savings|getSavings|spend|balance|financing|repay|health)(/|$) {
        proxy_pass http://backend:1299;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single-page app fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
