name: CI

# Runs on every push and PR to main. The docker-build job rebuilds the exact
# production image (root Dockerfile) each time, so a broken build is caught in
# GitHub before Railway deploys it.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    name: Build production Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the single-image container (frontend + backend)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: savings-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-check the image boots
        run: |
          # Boot without Mongo; it should start and answer /health before failing
          # fast on the DB. We only assert the process comes up and serves HTTP.
          docker run -d --name app -e PORT=8080 -e MONGO_URL=mongodb://127.0.0.1:27017 -p 8080:8080 savings-app:ci
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then echo "health OK"; ok=1; break; fi
            sleep 2
          done
          docker logs app | tail -30 || true
          docker rm -f app >/dev/null 2>&1 || true
          [ "$ok" = "1" ] || { echo "container did not serve /health"; exit 1; }

  test:
    name: Tests (backend + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Backend tests (TestNG)
        run: mvn -q -f back-end/pom.xml -Dcheckstyle.skip=true test

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Frontend install + test + build
        working-directory: front-end
        env:
          CI: "true"
        run: |
          npm ci || npm install
          npm test -- --watchAll=false
          npm run build
